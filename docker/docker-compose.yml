# Plex Poster Helper - GUI, headless scheduler, or both.
# Both services mount the same ./config folder, so the headless scheduler
# automatically reuses the Plex sign-in and schedules you set up in the GUI.
#
#   docker compose -f docker/docker-compose.yml up -d gui                            # browser GUI
#   docker compose -f docker/docker-compose.yml --profile headless up -d headless    # scheduler only
#   docker compose -f docker/docker-compose.yml --profile headless up -d             # both

services:
  # -- Full GUI in your browser (http://<host>:3000) --------------------------
  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: plex-poster-helper:gui
    container_name: plex-poster-helper
    ports:
      - "3939:3000"   # web UI (host 3939 → KasmVNC http). Change 3939 if it's taken.
      - "3940:3001"   # https (optional)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
    shm_size: "1gb"   # Chromium needs a decent /dev/shm
    restart: unless-stopped

  # -- Headless scheduler (no UI) ---------------------------------------------
  # Shares ./config with the gui service: sign in and build schedules there
  # first, then start this - it picks everything up automatically.
  headless:
    build:
      context: ..
      dockerfile: docker/Dockerfile.headless
    image: plex-poster-helper:headless
    container_name: plex-poster-helper-scheduler
    environment:
      - TZ=America/New_York
      # Optional overrides - NOT needed when sharing ./config with the GUI.
      # Only set these if you run headless standalone (no GUI container):
      # - PLEX_BASEURL=http://192.168.1.10:32400
      # - PLEX_TOKEN=your-plex-token
    volumes:
      - ./config:/config
    shm_size: "1gb"
    restart: unless-stopped
    profiles: ["headless"]   # only starts when explicitly selected
