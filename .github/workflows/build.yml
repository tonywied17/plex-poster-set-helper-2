# This workflow builds and releases the app when a new tag is pushed.
# It runs on both Windows and Linux to produce platform-specific builds, then cleans up unwanted .blockmap assets from the release.
# It also builds the Docker GUI image and pushes it to Docker Hub (molexxxx/plex-poster-helper-2).

# To trigger a release, create a new tag (e.g. `git tag v1.2.3`) and push it to the repository
# (`git push origin v1.2.3`). The workflow will automatically build the app for both platforms and publish
# the release with the generated assets.

name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`): the committed lockfile is generated on
      # Windows and omits a few Linux-only optional deps, which fails the
      # stricter `npm ci` on the Linux runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # Build the web UI image and push it to Docker Hub so the unraid template
  # (molexxxx/plex-poster-helper-2:latest) picks up new releases automatically.
  # Needs the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets (token from
  # hub.docker.com -> Account settings -> Personal access tokens, Read & Write).
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag with the release version (v1.2.3 -> 1.2.3) alongside latest.
      - name: Compute version tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Always re-pull the linuxserver base so each release picks up their
          # latest security patches instead of inheriting a stale cached layer.
          pull: true
          tags: |
            molexxxx/plex-poster-helper-2:latest
            molexxxx/plex-poster-helper-2:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Set the GitHub release body from the matching CHANGELOG.md section so every
  # tagged release ships with real notes instead of an empty body. Runs once the
  # build jobs have created/published the release.
  release-notes:
    name: Publish release notes
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      # Print the "## What's new in <tag>" section up to the next "## " heading.
      # h3 (### ) subheadings stay as content; only h2 headings end the section.
      - name: Extract notes for ${{ github.ref_name }}
        run: |
          awk -v tag="${{ github.ref_name }}" '
            /^## / { found = (index($0, tag) > 0) }
            found  { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for ${{ github.ref_name }}"
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Apply release notes
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --notes-file release-notes.md

  # electron-builder uploads .blockmap files (for delta updates) we don't want in
  # the release. Strip them once both build jobs have published their assets.
  cleanup:
    name: Strip .blockmap assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Remove .blockmap assets from the release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          for asset in $(gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' | grep '\.blockmap$' || true); do
            echo "Deleting $asset"
            gh release delete-asset "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --yes
          done

  # Ping the profile repo so the build / release / downloads badges refresh
  # immediately after a tagged build instead of waiting on its 2-hour cron.
  # Runs last (even if a build job failed) so the badge reflects reality.
  notify-badges:
    name: Refresh profile badges
    needs: [build, cleanup]
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Dispatch refresh-badges
        if: env.GH_TOKEN != ''
        run: |
          gh api -X POST repos/molexxxx/molexxxx/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
