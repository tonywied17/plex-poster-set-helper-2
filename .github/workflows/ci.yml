name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    # The Electron binary isn't needed to typecheck/build, and its postinstall is
    # unreliable under Node 22 - skip the download for a fast, deterministic CI.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`): the committed lockfile is generated on
      # Windows and omits a few Linux-only transitive optional deps (@emnapi/*),
      # which makes the stricter `npm ci` fail on the Linux runner. `npm install`
      # resolves them cleanly. (The Docker build does the same for this reason.)
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck renderer
        run: npx tsc --noEmit

      - name: Typecheck main process
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

  # Ping the profile repo so the CI / last-commit badges refresh immediately
  # instead of waiting on its 2-hour cron. Runs on pushes only (not PRs) and
  # even if CI failed, so the badge reflects the real conclusion.
  notify-badges:
    name: Refresh profile badges
    needs: [ci]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Dispatch refresh-badges
        if: env.GH_TOKEN != ''
        run: |
          gh api -X POST repos/molexxxx/molexxxx/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
