appId: com.tonywied17.plex-poster-set-helper
productName: Plex Poster Set Helper
copyright: Copyright © 2026 tonywied17

directories:
  output: dist-electron
  buildResources: resources

files:
  - electron/dist/**
  - src/dist/**
  - node_modules/**
  - package.json

# playwright must be outside the asar so utilityProcess.fork() can run its CLI
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"

extraMetadata:
  main: electron/dist/main.js

# App icon (orange play mark) — generated from resources/icon.svg.
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Plex Poster Set Helper
  uninstallDisplayName: Plex Poster Set Helper

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  maintainer: tonywied17

publish:
  provider: github
  owner: tonywied17
  repo: plex-poster-set-helper
  releaseType: release
  publishAutoUpdate: true
