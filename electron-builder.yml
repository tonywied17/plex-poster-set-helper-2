appId: com.tonywied17.plex-poster-set-helper-2
productName: Plex Poster Set Helper 2
copyright: Copyright © 2026 tonywied17

directories:
  output: dist-electron
  buildResources: resources

files:
  - electron/dist/**
  - src/dist/**
  - node_modules/**
  - package.json

# playwright must be outside the asar so utilityProcess.fork() can run its CLI
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"

extraMetadata:
  main: electron/dist/main.js

# Runtime icon rasters (tray, notifications, window) — generated by
# scripts/generate-icons.mjs from the SVG masters in resources/.
extraResources:
  - from: resources/icons
    to: icons

# App icon (poster-set mark) — generated from resources/icon.svg.
win:
  icon: resources/icon.ico
  artifactName: "${productName}-Setup-${version}-Windows.${ext}"
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Plex Poster Set Helper 2
  uninstallDisplayName: Plex Poster Set Helper 2

linux:
  icon: resources/icon.png
  artifactName: "${productName}-${version}-Linux.${ext}"
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  maintainer: tonywied17

publish:
  provider: github
  owner: SanchoBlaze
  repo: plex-poster-set-helper-2
  releaseType: release
  publishAutoUpdate: true
